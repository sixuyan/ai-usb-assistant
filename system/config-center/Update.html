<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant - Update Center</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 640px; margin: 0 auto; padding: 28px 20px 60px; }
h1 { text-align: center; font-size: 1.6em; margin-bottom: 4px; color: #ff6b35; }
.subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.88em; }

.card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
.card h2 { color: #ff6b35; font-size: 1.05em; margin-bottom: 12px; }

.version-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
.version-row:last-child { border-bottom: none; }
.version-label { color: #888; font-size: 0.85em; }
.version-value { color: #e0e0e0; font-size: 0.9em; font-family: monospace; }

.channel-select { display: flex; gap: 8px; margin-bottom: 16px; }
.channel-btn { flex: 1; padding: 10px; background: #222; border: 2px solid #333; border-radius: 8px; color: #888; cursor: pointer; text-align: center; font-size: 0.9em; transition: all 0.15s; }
.channel-btn:hover { border-color: #555; }
.channel-btn.active { border-color: #ff6b35; color: #ff6b35; background: rgba(255,107,53,0.06); }

.btn { display: inline-block; padding: 12px 28px; border: none; border-radius: 8px; font-size: 0.95em; cursor: pointer; font-weight: 600; transition: all 0.2s; width: 100%; text-align: center; }
.btn-primary { background: #ff6b35; color: #fff; }
.btn-primary:hover { background: #e55d2b; }
.btn-secondary { background: #333; color: #e0e0e0; }
.btn-secondary:hover { background: #444; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status { padding: 10px 14px; border-radius: 8px; margin: 12px 0; font-size: 0.85em; display: none; }
.status.show { display: block; }
.status.info { background: rgba(33,150,243,0.12); color: #90caf9; border: 1px solid rgba(33,150,243,0.25); }
.status.success { background: rgba(76,175,80,0.12); color: #81c784; border: 1px solid rgba(76,175,80,0.25); }
.status.warn { background: rgba(255,193,7,0.12); color: #ffd54f; border: 1px solid rgba(255,193,7,0.25); }
.status.error { background: rgba(244,67,54,0.12); color: #e57373; border: 1px solid rgba(244,67,54,0.25); }

.notes { background: #222; border-radius: 8px; padding: 14px; font-size: 0.82em; color: #aaa; max-height: 200px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
.notes:empty::after { content: 'No release notes available.'; color: #555; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ff6b35; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.nav { text-align: center; margin-top: 16px; }
.nav a { color: #ff6b35; text-decoration: none; font-size: 0.88em; }
.nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <h1>AI Assistant - Update Center</h1>
    <p class="subtitle">Check and install system updates. Your data is never affected.</p>

    <!-- Current Version -->
    <div class="card">
        <h2>Current System</h2>
        <div class="version-row">
            <span class="version-label">Version</span>
            <span class="version-value" id="currentVersion">Loading...</span>
        </div>
        <div class="version-row">
            <span class="version-label">Channel</span>
            <span class="version-value" id="currentChannel">-</span>
        </div>
        <div class="version-row">
            <span class="version-label">Last Updated</span>
            <span class="version-value" id="lastUpdate">-</span>
        </div>
    </div>

    <!-- Check for Updates -->
    <div class="card">
        <h2>Check for Updates</h2>
        <div class="channel-select">
            <button class="channel-btn active" data-channel="stable" onclick="selectChannel('stable')">Stable</button>
            <button class="channel-btn" data-channel="beta" onclick="selectChannel('beta')">Beta</button>
        </div>
        <div id="statusBar"></div>
        <button class="btn btn-primary" id="checkBtn" onclick="checkUpdates()">
            Check for Updates
        </button>
        <p style="color:#666;font-size:0.75em;margin-top:8px;text-align:center;">
            Only changed files are downloaded. User data is never touched.
        </p>
    </div>

    <!-- Release Notes -->
    <div class="card">
        <h2>Release Notes</h2>
        <div class="notes" id="releaseNotes"></div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
        <h2>Quick Actions</h2>
        <button class="btn btn-secondary" style="margin-bottom:8px;" onclick="runUpdate()">
            Run Full Update (UPDATE.bat)
        </button>
        <button class="btn btn-secondary" onclick="runDoctor()">
            Run System Diagnostic
        </button>
    </div>

    <div class="nav">
        <a href="/">Back to Config Center</a>
    </div>
</div>

<script>
let selectedChannel = 'stable';

// ---- Load version info ----
async function loadVersion() {
    try {
        const r = await fetch('/api/version');
        const info = await r.json();
        document.getElementById('currentVersion').textContent = info.version || 'unknown';
        document.getElementById('currentChannel').textContent = info.channel || '-';
        document.getElementById('lastUpdate').textContent = info.lastUpdate || 'Never';
        if (info.releaseNotes) {
            document.getElementById('releaseNotes').textContent = info.releaseNotes;
        }
        if (info.channel) {
            selectChannel(info.channel);
        }
    } catch (e) {
        document.getElementById('currentVersion').textContent = 'Error loading';
    }
}

// ---- Channel selection ----
function selectChannel(ch) {
    selectedChannel = ch;
    document.querySelectorAll('.channel-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.channel === ch);
    });
}

// ---- Check updates ----
async function checkUpdates() {
    const btn = document.getElementById('checkBtn');
    const status = document.getElementById('statusBar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Checking...';

    status.className = 'status show info';
    status.textContent = 'Connecting to update server...';

    try {
        const url = `https://ai-usb-updates.oss-cn-hangzhou.aliyuncs.com/releases/${selectedChannel}/manifest.json`;
        const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
        if (!r.ok) throw new Error(`Server returned ${r.status}`);

        const remote = await r.json();
        const currentVer = document.getElementById('currentVersion').textContent;

        if (remote.version === currentVer) {
            status.className = 'status show success';
            status.textContent = `You are on the latest version (${currentVer}).`;
        } else {
            status.className = 'status show warn';
            status.textContent = `Update available: ${currentVer} -> ${remote.version}. Run UPDATE.bat to install.`;
        }

        // Show release notes
        if (remote.releaseNotes) {
            document.getElementById('releaseNotes').textContent = remote.releaseNotes;
        }

        // Show file count
        const files = remote.summary ? remote.summary.totalFiles : '?';
        const size = remote.summary ? remote.summary.totalSizeMB + ' MB' : '?';
        status.textContent += ` (${files} files, ${size})`;

    } catch (e) {
        status.className = 'status show error';
        if (e.name === 'TimeoutError' || e.name === 'AbortError') {
            status.textContent = 'Update server is unreachable. Check your internet connection.';
        } else if (e.message.includes('404')) {
            status.textContent = `No updates available for "${selectedChannel}" channel yet.`;
        } else {
            status.textContent = 'Could not check for updates: ' + e.message;
        }
        status.textContent += ' You can still run UPDATE.bat manually.';
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Check for Updates';
    }
}

// ---- Actions ----
function runUpdate() {
    const status = document.getElementById('statusBar');
    status.className = 'status show info';
    status.innerHTML = '<strong>To install updates:</strong><br><br>' +
        '1. Open the U-disk root folder<br>' +
        '2. Double-click <code>UPDATE.bat</code><br>' +
        '3. Follow the on-screen instructions<br>' +
        '4. Restart the AI Assistant (START.bat)<br><br>' +
        '<em>Or run from PowerShell:</em><br>' +
        '<code>PowerShell -File system\\scripts\\update.ps1</code>';
}

function runDoctor() {
    const status = document.getElementById('statusBar');
    status.className = 'status show info';
    status.innerHTML = '<strong>To run system diagnostic:</strong><br><br>' +
        'Open PowerShell in the U-disk root and run:<br>' +
        '<code>PowerShell -File system\\scripts\\doctor.ps1</code><br><br>' +
        '<em>Or from the menu:</em> double-click <code>menu.bat</code> and select option 7.';
}

// ---- Init ----
loadVersion();
</script>
</body>
</html>
