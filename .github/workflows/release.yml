# .github/workflows/release.yml
# =========================================================================
# AI USB Assistant - Automated Release Pipeline
#
# Triggered by: pushing a version tag (e.g. v2026.5.19)
#
# Workflow:
#   1. Checkout code
#   2. Run generate-manifest.ps1 to create manifest + stage files
#   3. Upload to Alibaba Cloud OSS
#   4. Create GitHub Release with release notes
# =========================================================================

name: Release to OSS

on:
  push:
    tags:
      - 'v*'               # Trigger on version tags: v2026.5.19, v1.0.0, etc.
  workflow_dispatch:        # Allow manual trigger
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

env:
  OSS_BUCKET: ai-usb-updates
  OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Read version from tag ----
      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = Get-Content system/VERSION -Raw
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      # ---- Generate manifest ----
      - name: Generate manifest
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel || 'stable' }}"
          .\system\scripts\generate-manifest.ps1 `
            -Channel $channel `
            -ReleaseNotes "Automated release ${{ steps.version.outputs.VERSION }}" `
            -Upload `
            -Quiet

      # ---- Upload to OSS using PowerShell REST API ----
      - name: Upload to OSS
        shell: pwsh
        run: |
          $bucket = "${{ env.OSS_BUCKET }}"
          $endpoint = "${{ env.OSS_ENDPOINT }}"
          $accessKeyId = "${{ env.OSS_ACCESS_KEY_ID }}"
          $accessKeySecret = "${{ env.OSS_ACCESS_KEY_SECRET }}"
          $channel = "stable"
          $repoRoot = (Get-Location).Path

          # Get all files in releases/$channel/
          $files = Get-ChildItem -Path "releases/$channel" -Recurse -File
          foreach ($file in $files) {
            # Compute OSS object key relative to releases/<channel>/
            # e.g. D:\a\...\releases\stable\files\system\scripts\boot.ps1 -> files/system/scripts/boot.ps1
            $filePathInRepo = $file.FullName.Substring($repoRoot.Length + 1).Replace("\", "/")
            $objectKey = $filePathInRepo
            $url = "https://$bucket.$endpoint/$objectKey"

            # Calculate MD5
            $md5Instance = [System.Security.Cryptography.MD5]::Create()
            $hash = $md5Instance.ComputeHash([System.IO.File]::ReadAllBytes($file.FullName))
            $contentMD5 = [Convert]::ToBase64String($hash)

            # Build OSS signature using x-oss-date header (avoids Date format issues)
            $ossDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
            $contentType = if ($file.Extension -eq ".json") { "application/json" } elseif ($file.Extension -eq ".html") { "text/html" } else { "application/octet-stream" }
            $signedString = "PUT`n`n$contentType`n$contentMD5`n$ossDate`n/$bucket.$endpoint/$objectKey"
            $hmac = [System.Security.Cryptography.HMACSHA1]::new([System.Text.Encoding]::UTF8.GetBytes($accessKeySecret))
            $signature = [Convert]::ToBase64String($hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($signedString)))
            $auth = "OSS $accessKeyId`:$signature"

            Write-Host "Uploading $objectKey..."
            try {
              $headers = @{
                "Authorization" = $auth
                "Content-MD5" = $contentMD5
                "Content-Type" = $contentType
                "x-oss-date" = $ossDate
              }
              Invoke-RestMethod -Uri $url -Method PUT -Headers $headers -Body ([System.IO.File]::ReadAllBytes($file.FullName)) -ContentType $contentType
              Write-Host "  OK: $objectKey"
            } catch {
              Write-Host "  FAILED: $objectKey - $($_.Exception.Message)"
            }
          }
          Write-Host "Upload complete!"

      # ---- Create GitHub Release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## AI USB Assistant v${{ steps.version.outputs.VERSION }}

            ### Update URL
            ```
            https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/releases/stable/manifest.json
            ```

            ### How to update
            1. Insert your USB drive
            2. Double-click `UPDATE.bat`
            3. Restart the assistant

            ### Changes
            - See commit history for details
          generate_release_notes: true

      # ---- Post-release summary ----
      - name: Summary
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel || 'stable' }}"
          Write-Host "========================================" -ForegroundColor Green
          Write-Host " Release Complete!" -ForegroundColor Green
          Write-Host " Version:  ${{ steps.version.outputs.VERSION }}" -ForegroundColor Cyan
          Write-Host " Channel:  $channel" -ForegroundColor Cyan
          Write-Host " Manifest: https://$env:OSS_BUCKET.$env:OSS_ENDPOINT/releases/$channel/manifest.json" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Green
