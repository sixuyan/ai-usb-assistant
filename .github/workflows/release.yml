# .github/workflows/release.yml
# =========================================================================
# AI USB Assistant - Automated Release Pipeline
#
# Triggered by: pushing a version tag (e.g. v2026.5.19)
#
# Workflow:
#   1. Checkout code
#   2. Run generate-manifest.ps1 to create manifest + stage files
#   3. Upload to Alibaba Cloud OSS
#   4. Create GitHub Release with release notes
# =========================================================================

name: Release to OSS

on:
  push:
    tags:
      - 'v*'               # Trigger on version tags: v2026.5.19, v1.0.0, etc.
  workflow_dispatch:        # Allow manual trigger
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

env:
  OSS_BUCKET: ai-usb-updates
  OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Read version from tag ----
      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = Get-Content system/VERSION -Raw
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      # ---- Generate manifest ----
      - name: Generate manifest
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel || 'stable' }}"
          .\system\scripts\generate-manifest.ps1 `
            -Channel $channel `
            -ReleaseNotes "Automated release ${{ steps.version.outputs.VERSION }}" `
            -Upload `
            -Quiet

      # ---- Upload to OSS using aliyun openapi SDK via node.js ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upload to OSS via Node.js
        shell: pwsh
        run: |
          node -e "
          const https = require('https');
          const http = require('http');
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const bucket = '${{ env.OSS_BUCKET }}';
          const endpoint = '${{ env.OSS_ENDPOINT }}';
          const accessKeyId = '${{ env.OSS_ACCESS_KEY_ID }}';
          const accessKeySecret = '${{ env.OSS_ACCESS_KEY_SECRET }}';
          const channel = 'stable';
          const repoRoot = process.cwd();

          function putObject(objectKey, filePath) {
            return new Promise((resolve, reject) => {
              const body = fs.readFileSync(filePath);
              const md5 = crypto.createHash('md5').update(body).digest('base64');
              const date = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z').replace(/[:-]/g, '').replace(/T(\d{2}):(\d{2}):(\d{2})/, 'T$1$2$3');
              const contentType = objectKey.endsWith('.json') ? 'application/json' : objectKey.endsWith('.html') ? 'text/html' : 'application/octet-stream';

              const signedString = ['PUT', '', contentType, md5, date, `/${bucket}/${objectKey}`].join('\n');
              const signature = crypto.createHmac('sha1', accessKeySecret).update(signedString).digest('base64');
              const auth = \`OSS \${accessKeyId}:\${signature}\`;

              const options = {
                hostname: bucket + '.' + endpoint,
                path: '/' + objectKey,
                method: 'PUT',
                headers: {
                  'Authorization': auth,
                  'Content-MD5': md5,
                  'Content-Type': contentType,
                  'Content-Length': body.length,
                  'x-oss-date': date
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    console.log('  OK: ' + objectKey);
                    resolve();
                  } else {
                    console.log('  FAILED: ' + objectKey + ' (HTTP ' + res.statusCode + ': ' + data.substring(0, 100) + ')');
                    resolve(); // don't fail整个 upload for one file
                  }
                });
              });
              req.on('error', e => { console.log('  FAILED: ' + objectKey + ' - ' + e.message); resolve(); });
              req.write(body);
              req.end();
            });
          }

          async function main() {
            const baseDir = path.join(repoRoot, 'releases', channel);
            const files = [];
            function walk(dir) {
              for (const f of fs.readdirSync(dir, {withFileTypes: true})) {
                const full = path.join(dir, f.name);
                if (f.isDirectory()) walk(full);
                else files.push(full);
              }
            }
            walk(baseDir);

            for (const file of files) {
              const rel = path.relative(baseDir, file).replace(/\\\\/g, '/');
              const objectKey = rel;
              await putObject(objectKey, file);
            }
            console.log('Upload complete!');
          }
          main().catch(e => { console.error(e); process.exit(1); });
          "

      # ---- Create GitHub Release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## AI USB Assistant v${{ steps.version.outputs.VERSION }}

            ### Update URL
            ```
            https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/releases/stable/manifest.json
            ```

            ### How to update
            1. Insert your USB drive
            2. Double-click `UPDATE.bat`
            3. Restart the assistant

            ### Changes
            - See commit history for details
          generate_release_notes: true

      # ---- Post-release summary ----
      - name: Summary
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel || 'stable' }}"
          Write-Host "========================================" -ForegroundColor Green
          Write-Host " Release Complete!" -ForegroundColor Green
          Write-Host " Version:  ${{ steps.version.outputs.VERSION }}" -ForegroundColor Cyan
          Write-Host " Channel:  $channel" -ForegroundColor Cyan
          Write-Host " Manifest: https://$env:OSS_BUCKET.$env:OSS_ENDPOINT/releases/$channel/manifest.json" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Green
